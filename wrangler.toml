name = "aphelion-systems"
compatibility_date = "2025-01-01"

# Static-assets-only Worker: serve the repo root as a static site.
# No server code (no `main`), just the HTML/CSS/JS/images.
[assets]
directory = "./"

# Attach the domain to this Worker (creates the DNS record + SSL on deploy).
[[routes]]
pattern = "www.aphelionsystems.dev"
custom_domain = true

[[routes]]
pattern = "aphelionsystems.dev"
custom_domain = true
